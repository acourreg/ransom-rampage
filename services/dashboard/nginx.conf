server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: all paths fallback to index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Local dev: proxy API calls to api-gateway container
    # In prod (EKS): ALB routes /api/* directly to api-gateway pods
    location /api/ {
        proxy_pass http://api-gateway:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
