name: CI — Build & Push

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check services/api-gateway/

      - name: Test (pytest — engine only)
        run: |
          cd services/api-gateway
          pip install -r requirements.txt
          pytest tests/core/test_engine.py -v --timeout=30
        continue-on-error: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push api-gateway
        run: |
          docker build -t $ECR_REGISTRY/api-gateway:${{ github.sha }} \
                        -t $ECR_REGISTRY/api-gateway:latest \
                        services/api-gateway/
          docker push $ECR_REGISTRY/api-gateway --all-tags

      - name: Build & push dashboard
        run: |
          docker build -t $ECR_REGISTRY/dashboard:${{ github.sha }} \
                        -t $ECR_REGISTRY/dashboard:latest \
                        services/dashboard/
          docker push $ECR_REGISTRY/dashboard --all-tags

      - name: Trivy scan api-gateway
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/api-gateway:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Trivy scan dashboard
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/dashboard:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Update image tag in ArgoCD Application
        run: |
          cd k8s/argocd
          sed -i "s|value: .*|value: ${{ github.sha }}|g" application.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add application.yaml
          git diff --cached --quiet || git commit -m "ci: update image tag to ${{ github.sha }}"
          git push
