apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name | lower }}
  namespace: {{ .Values.namespace | default "ransom-rampage" }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    # Must match the labels we put in the Deployment!
    app: {{ .Release.Name | lower }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}