apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: ransom-rampage
spec:
  refreshInterval: 1h             # Sync with AWS every hour
  secretStoreRef:
    name: aws-ssm-store           # The bridge we defined earlier
    kind: ClusterSecretStore
  target:
    name: app-secrets             # The name of the Secret our app will "see"
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: /ransom-rampage/openai-api-key # Path in AWS SSM
    - secretKey: REDIS_URL
      remoteRef:
        key: /ransom-rampage/redis-url