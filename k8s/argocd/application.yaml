# PLACEHOLDERs for ECR URLs are replaced by scripts/deploy.sh
# image.tag lines marked MANAGED_BY_CI are updated by CI pipeline
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/acourreg/ransom-rampage.git
    targetRevision: main
    path: helm/microservice
    helm:
      valueFiles:
        - values.yml
      parameters:
        - name: image.repository
          value: "__ECR_API_GATEWAY_URL__"
        - name: image.tag
          # MANAGED_BY_CI
          value: 7aa4632d1f045fe1fbb58fd0750a354f2d222aad
        - name: service.port
          value: "8000"
        - name: probes.path
          value: /health
        - name: probes.port
          value: "8000"
        - name: probes.initialDelaySeconds
          value: "30"
        - name: replicaCount
          value: "1"
        - name: resources.requests.memory
          value: 512Mi
        - name: resources.limits.memory
          value: 1Gi
        - name: resources.requests.cpu
          value: 250m
        - name: resources.limits.cpu
          value: 500m
  destination:
    server: https://kubernetes.default.svc
    namespace: ransom-rampage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dashboard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/acourreg/ransom-rampage.git
    targetRevision: main
    path: helm/microservice
    helm:
      valueFiles:
        - values.yml
      parameters:
        - name: image.repository
          value: "__ECR_DASHBOARD_URL__"
        - name: image.tag
          # MANAGED_BY_CI
          value: 7aa4632d1f045fe1fbb58fd0750a354f2d222aad
        - name: service.port
          value: "80"
        - name: probes.path
          value: /
        - name: probes.port
          value: "80"
  destination:
    server: https://kubernetes.default.svc
    namespace: ransom-rampage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
