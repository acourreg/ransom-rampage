apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ransom-rampage-public
  namespace: ransom-rampage
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/group.name: ransom-rampage
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/auth-type: none
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:eu-west-1:810729346256:certificate/758f6356-747d-447e-8cf6-04da6e0bec11"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
spec:
  rules:
  - http:
      paths:
      - path: /health
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-gateway
            port:
              number: 8000
      - path: /assets/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: dashboard
            port:
              number: 80
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: dashboard
            port:
              number: 80
