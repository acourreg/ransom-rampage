# AFTER terraform apply, replace PLACEHOLDERs with:
#   arn:aws:acm:eu-west-1:810729346256:certificate/758f6356-747d-447e-8cf6-04da6e0bec11       → terraform output -raw acm_certificate_arn
#   arn:aws:cognito-idp:eu-west-1:810729346256:userpool/eu-west-1_Ixvrmycm5 → terraform output -raw cognito_user_pool_arn
#   5qul51encnd97drushbajk4csr     → terraform output -raw cognito_user_pool_client_id
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ransom-rampage-protected
  namespace: ransom-rampage
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/group.name: ransom-rampage
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/auth-type: cognito
    alb.ingress.kubernetes.io/auth-on-unauthenticated-request: authenticate
    alb.ingress.kubernetes.io/auth-idp-cognito: >
      {
        "userPoolARN": "arn:aws:cognito-idp:eu-west-1:810729346256:userpool/eu-west-1_Ixvrmycm5",
        "userPoolClientID": "5qul51encnd97drushbajk4csr",
        "userPoolDomain": "ransomrampage"
      }
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:eu-west-1:810729346256:certificate/758f6356-747d-447e-8cf6-04da6e0bec11"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
spec:
  rules:
  - http:
      paths:
      - path: /play/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: dashboard
            port:
              number: 80
      - path: /api/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-gateway
            port:
              number: 8000
