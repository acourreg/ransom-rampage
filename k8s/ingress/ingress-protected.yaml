# PLACEHOLDERs are replaced by scripts/deploy.sh using terraform outputs
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ransom-rampage-protected
  namespace: ransom-rampage
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/group.name: ransom-rampage
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/auth-type: cognito
    alb.ingress.kubernetes.io/auth-on-unauthenticated-request: authenticate
    alb.ingress.kubernetes.io/auth-idp-cognito: >
      {
        "userPoolARN": "__COGNITO_USER_POOL_ARN__",
        "userPoolClientID": "__COGNITO_USER_POOL_CLIENT_ID__",
        "userPoolDomain": "ransomrampage"
      }
    alb.ingress.kubernetes.io/certificate-arn: "__ACM_CERTIFICATE_ARN__"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
spec:
  rules:
  - http:
      paths:
      - path: /play
        pathType: ImplementationSpecific
        backend:
          service:
            name: dashboard
            port:
              number: 80
      - path: /play/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: dashboard
            port:
              number: 80
      - path: /api/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-gateway
            port:
              number: 8000
